services:
  # ─── Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:latest
    ports:
      - "${APP_PORT:-8100}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # ─── PHP-FPM Application ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    volumes:
      - .:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost:8100}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL:-mysql://oci:oci@mariadb:3306/oci?charset=utf8mb4}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Conzent}
      - CMP_ID=${CMP_ID:-}
      - CDN_URL=${CDN_URL:-}
      - MONETIZATION_MODEL=oci
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ─── Queue Worker ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    command: ["php", "bin/oci", "queue:work"]
    volumes:
      - .:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-mysql://oci:oci@mariadb:3306/oci?charset=utf8mb4}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    restart: unless-stopped

  # ─── Scheduler (cron replacement) ───────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    command: ["php", "bin/oci", "schedule:run"]
    volumes:
      - .:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-mysql://oci:oci@mariadb:3306/oci?charset=utf8mb4}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    restart: unless-stopped

  # ─── MariaDB ─────────────────────────────────────────────
  mariadb:
    image: mariadb:latest
    volumes:
      - oci-db-data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-oci}
      MARIADB_USER: ${DB_USER:-oci}
      MARIADB_PASSWORD: ${DB_PASSWORD:-oci}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:latest
    volumes:
      - oci-redis-data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  oci-db-data:
    driver: local
  oci-redis-data:
    driver: local
