server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Static assets — serve directly
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Generated consent scripts — serve directly with CORS
    # Uses ?v=hash query param for cache-busting on save
    location /sites_data/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Vary "Accept-Encoding" always;

        # Dev: no-cache, no-store to prevent stale scripts during development
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Version file should never be cached
        location ~ /version\.json$ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            try_files $uri =404;
        }

        try_files $uri =404;
    }

    # CMP loader script — edge-cached 24h, browser revalidates via ETag. Purged on deploy.
    location /c/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=0, s-maxage=86400" always;
        try_files $uri =404;
    }

    # Legacy CMP loader path — redirect to new path
    location /cmp/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # IAB TCF vendor list — serve with CORS (cross-origin banner scripts need this)
    location /iab/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Health check (bypass PHP for fast probe)
    location = /health {
        try_files $uri /index.php$is_args$args;
    }

    # All requests → PHP front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;

        # Timeouts
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 60s;
    }

    # Block access to dotfiles and sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(legacy|var|config|src|tests|migrations|docker|development|vendor|bin)/ {
        deny all;
    }
}
