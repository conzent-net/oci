server {
    listen 80;
    server_name app.getconzent.com;
    root /var/www/html/public;
    index index.php;

    # Cloudflare real IP (trust Cloudflare proxy)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Static assets — serve directly (hashed filenames, immutable)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Media files (logos, icons) — rarely change, long cache with revalidation
    location /media/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, s-maxage=2592000";
        try_files $uri =404;
    }

    # Generated consent scripts — serve directly with CORS
    location /sites_data/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Vary "Accept-Encoding" always;

        set $cache_ttl "public, max-age=0, s-maxage=3600";
        if ($args ~* "v=") {
            set $cache_ttl "public, max-age=31536000, s-maxage=31536000, immutable";
        }
        add_header Cache-Control $cache_ttl always;

        # Version file should never be cached
        location ~ /version\.json$ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            try_files $uri =404;
        }

        try_files $uri =404;
    }

    # CMP loader script — cached 7 days browser + 7 days edge. Purged on deploy.
    location /c/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=604800, s-maxage=604800" always;
        try_files $uri =404;
    }

    # Legacy CMP loader path — keep working for existing installations
    location /cmp/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # IAB TCF vendor list
    location /iab/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Health check
    location = /health {
        try_files $uri /index.php$is_args$args;
    }

    # All requests → PHP front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;

        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 60s;
    }

    # Block access to dotfiles and sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(legacy|var|config|src|tests|migrations|docker|development|vendor|bin)/ {
        deny all;
    }
}
