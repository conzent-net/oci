; OCI PHP Configuration
; ───────────────────────────────────

; Error handling (dev: show errors; prod: set both to Off)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Limits
memory_limit = 256M
max_execution_time = 30
max_input_time = 30
post_max_size = 16M
upload_max_filesize = 16M

; OPcache (production-tuned)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
; JIT disabled — can cause segfaults with complex string operations
; Re-enable in production after testing: opcache.jit = tracing
opcache.jit = off
opcache.jit_buffer_size = 0

; Sessions (handled by Redis, but set sane defaults)
session.cookie_httponly = 1
; cookie_secure = 0 for local dev (HTTP); set to 1 in production (HTTPS)
session.cookie_secure = 0
session.cookie_samesite = Lax
session.use_strict_mode = 1
session.gc_maxlifetime = 7200

; Timezone
date.timezone = UTC

; Charset
default_charset = UTF-8
