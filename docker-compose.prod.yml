services:
  # ─── Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:latest
    ports:
      - "127.0.0.1:8200:80"
    volumes:
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public
      - sites-data:/var/www/html/public/sites_data:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PHP-FPM Application ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    volumes:
      # Source code from host — git pull + restart = deployed
      - ./src:/var/www/html/src:ro
      - ./config:/var/www/html/config:ro
      - ./templates:/var/www/html/templates:ro
      - ./resources:/var/www/html/resources:ro
      - ./migrations:/var/www/html/migrations:ro
      - ./bin:/var/www/html/bin:ro
      - ./public:/var/www/html/public
      # Persistent data
      - sites-data:/var/www/html/public/sites_data
      - app-var:/var/www/html/var
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.local
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Queue Worker ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    command: ["php", "bin/oci", "queue:work"]
    volumes:
      - ./src:/var/www/html/src:ro
      - ./config:/var/www/html/config:ro
      - ./templates:/var/www/html/templates:ro
      - ./resources:/var/www/html/resources:ro
      - ./migrations:/var/www/html/migrations:ro
      - ./bin:/var/www/html/bin:ro
      - sites-data:/var/www/html/public/sites_data
      - app-var:/var/www/html/var
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.local
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Scheduler (cron replacement) ───────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    command: ["php", "bin/oci", "schedule:run"]
    volumes:
      - ./src:/var/www/html/src:ro
      - ./config:/var/www/html/config:ro
      - ./templates:/var/www/html/templates:ro
      - ./resources:/var/www/html/resources:ro
      - ./migrations:/var/www/html/migrations:ro
      - ./bin:/var/www/html/bin:ro
      - sites-data:/var/www/html/public/sites_data
      - app-var:/var/www/html/var
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.local
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Cookie Scanner (optional — can run on separate server) ─
  scanner:
    build:
      context: ./docker/scanner
      dockerfile: Dockerfile
    environment:
      - PORT=8300
      - SCANNER_API_KEY=${SCANNER_API_KEY}
      - MAX_CONCURRENT=${SCANNER_MAX_CONCURRENT:-5}
      - SCAN_TIMEOUT=${SCANNER_TIMEOUT:-60000}
    shm_size: '256m'
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── MariaDB ─────────────────────────────────────────────
  mariadb:
    image: mariadb:latest
    volumes:
      - db-data:/var/lib/mysql
    env_file: .env.local
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── phpMyAdmin ─────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8201:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      mariadb:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:latest
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  sites-data:
    driver: local
  app-var:
    driver: local
