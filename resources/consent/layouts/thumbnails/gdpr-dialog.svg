<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" fill="none">
  <!-- Page background with overlay -->
  <rect width="280" height="160" rx="4" fill="#f0f0f0"/>
  <rect width="280" height="160" rx="4" fill="#000" opacity="0.15"/>
  <!-- Centered dialog -->
  <rect x="20" y="15" width="240" height="130" rx="6" fill="#fff" filter="url(#shadow)"/>
  <!-- Header bar -->
  <line x1="20" y1="38" x2="260" y2="38" stroke="#e5e5e5" stroke-width="1"/>
  <!-- Logo circle in header -->
  <circle cx="38" cy="27" r="7" fill="#e8e8e8"/>
  <!-- Branding text right -->
  <rect x="210" y="25" width="40" height="3" rx="1.5" fill="#ccc"/>
  <!-- Title -->
  <rect x="34" y="46" width="120" height="5" rx="2.5" fill="#444"/>
  <!-- Message lines -->
  <rect x="34" y="58" width="210" height="3" rx="1.5" fill="#999"/>
  <rect x="34" y="65" width="190" height="3" rx="1.5" fill="#999"/>
  <rect x="34" y="72" width="160" height="3" rx="1.5" fill="#999"/>
  <!-- Category toggles row -->
  <line x1="34" y1="82" x2="246" y2="82" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="34" y="88" width="40" height="4" rx="2" fill="#666"/>
  <rect x="80" y="88" width="12" height="6" rx="3" fill="#2563eb"/>
  <rect x="104" y="88" width="40" height="4" rx="2" fill="#666"/>
  <rect x="150" y="88" width="12" height="6" rx="3" fill="#2563eb"/>
  <rect x="174" y="88" width="40" height="4" rx="2" fill="#666"/>
  <rect x="220" y="88" width="12" height="6" rx="3" fill="#2563eb"/>
  <line x1="34" y1="100" x2="246" y2="100" stroke="#e5e5e5" stroke-width="1"/>
  <!-- Three equal buttons -->
  <rect x="34" y="108" width="68" height="16" rx="3" fill="none" stroke="#ccc" stroke-width="1"/>
  <rect x="106" y="108" width="68" height="16" rx="3" fill="none" stroke="#ccc" stroke-width="1"/>
  <rect x="178" y="108" width="68" height="16" rx="3" fill="#2563eb"/>
  <!-- Shadow filter -->
  <defs>
    <filter id="shadow" x="-4" y="-2" width="252" height="142" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
</svg>
