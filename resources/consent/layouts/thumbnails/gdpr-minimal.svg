<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" fill="none">
  <!-- Page background -->
  <rect width="280" height="160" rx="4" fill="#f0f0f0"/>
  <!-- Page content lines -->
  <rect x="20" y="16" width="120" height="6" rx="3" fill="#ddd"/>
  <rect x="20" y="28" width="240" height="4" rx="2" fill="#e8e8e8"/>
  <rect x="20" y="36" width="200" height="4" rx="2" fill="#e8e8e8"/>
  <!-- Minimal bottom bar (compact, no title) -->
  <rect x="0" y="120" width="280" height="40" rx="0" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="16" y="130" width="150" height="3" rx="1.5" fill="#999"/>
  <rect x="16" y="137" width="120" height="3" rx="1.5" fill="#999"/>
  <!-- Compact buttons -->
  <rect x="200" y="128" width="34" height="14" rx="3" fill="#2563eb"/>
  <rect x="238" y="128" width="28" height="14" rx="3" fill="none" stroke="#ccc" stroke-width="1"/>
</svg>
