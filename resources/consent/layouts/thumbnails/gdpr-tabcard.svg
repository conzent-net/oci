<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" fill="none">
  <!-- Page background with overlay -->
  <rect width="280" height="160" rx="4" fill="#f0f0f0"/>
  <rect width="280" height="160" rx="4" fill="#000" opacity="0.15"/>
  <!-- Centered card -->
  <rect x="65" y="8" width="150" height="144" rx="10" fill="#fff" filter="url(#shadow)"/>
  <!-- Colored header strip -->
  <rect x="65" y="8" width="150" height="30" rx="10" fill="#2563eb"/>
  <rect x="65" y="24" width="150" height="14" fill="#2563eb"/>
  <!-- Logo circle on header -->
  <circle cx="140" cy="26" r="8" fill="rgba(255,255,255,0.3)"/>
  <!-- Title -->
  <rect x="100" y="48" width="80" height="5" rx="2.5" fill="#444"/>
  <!-- Message lines -->
  <rect x="80" y="60" width="120" height="3" rx="1.5" fill="#999"/>
  <rect x="85" y="67" width="110" height="3" rx="1.5" fill="#999"/>
  <rect x="90" y="74" width="100" height="3" rx="1.5" fill="#999"/>
  <!-- Footer colored area -->
  <rect x="65" y="84" width="150" height="68" rx="0" fill="#2563eb" opacity="0.1"/>
  <rect x="65" y="138" width="150" height="14" rx="0 0 10 10" fill="#2563eb" opacity="0.1"/>
  <!-- Buttons row -->
  <rect x="120" y="90" width="42" height="12" rx="3" fill="none" stroke="#ccc" stroke-width="1"/>
  <rect x="166" y="90" width="42" height="12" rx="3" fill="#2563eb"/>
  <!-- Separator -->
  <line x1="78" y1="108" x2="202" y2="108" stroke="#ccc" stroke-width="0.5"/>
  <!-- 2x2 toggle grid -->
  <rect x="78" y="114" width="30" height="4" rx="2" fill="#666"/>
  <rect x="114" y="114" width="10" height="5" rx="2.5" fill="#2563eb"/>
  <rect x="148" y="114" width="30" height="4" rx="2" fill="#666"/>
  <rect x="184" y="114" width="10" height="5" rx="2.5" fill="#2563eb"/>
  <rect x="78" y="126" width="30" height="4" rx="2" fill="#666"/>
  <rect x="114" y="126" width="10" height="5" rx="2.5" fill="#2563eb"/>
  <rect x="148" y="126" width="30" height="4" rx="2" fill="#666"/>
  <rect x="184" y="126" width="10" height="5" rx="2.5" fill="#2563eb"/>
  <!-- Shadow filter -->
  <defs>
    <filter id="shadow" x="-4" y="-2" width="162" height="156" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
</svg>
